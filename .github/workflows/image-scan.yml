# uses trivy for image scan CSVs
name: docker image scan

on:
    workflow_call:
        secrets:
           DOCKERHUB_TOKEN:
            required: true
           DOCKERHUB_USER:
            required: true
jobs:
    Docker_image_validation:
        runs-on: ubuntu-latest
        steps:
            - name: login to docker hub               #after build the image from docker file where we find the image (dockerhub)
              uses: docker/login-action@v3            # so first we need to login dockerhub 
              with:
                username: ${{vars.DOCKERHUB_USER}}        # for that reason we need this step to login
                password: ${{secrets.DOCKERHUB_TOKEN}}
            
            - name: Trivy scanner 
              uses: aquasecurity/trivy-action@0.35.0
              with:
               severity: 'CRITICAL'
               exit-code: '1'