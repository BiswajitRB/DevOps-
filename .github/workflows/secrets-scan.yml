#API key,sensitive data we scan here using GitLekas
name: secrets-scan

on:
    workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              with:                              #its use for 0 defth codescan, which means its scan all entire code lines 
                fetch-depth: 0

            - name: run GitLekas scaner
              uses: gitleaks/gitleaks-action@v2.3.4
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}  # the secret key automatically manage by git action we does not need to do any thing    

