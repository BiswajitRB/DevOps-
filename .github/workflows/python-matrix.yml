name: python lint

on: 
    push: 
        branches: [main]

jobs:
    validate:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.13", "3.12", "3.11", "3.10", "3.9", "3.8"]
        
        steps:
            - name: checkout code
              uses: actions/checkout@v4
        
            - name: python setup
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: install dependencies
              run: pip install -r requirements.txt

            - name: run linter
              run: flake8 app.py