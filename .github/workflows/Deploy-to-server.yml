# deploy to server using ssh 
#deploying to a server safe/ secure and tested application (help of DevSecOps principles) 
name: deploy to server
on:
    workflow_call:
        secrets:
           EC2_SSH_HOST:
            required: true
           EC2_SSH_PRIVATE_KEY:
            required: true
           EC2_SSH_USERNAME:
            required: true
jobs:
    deploy:
        runs-on: ubuntu-latest       # why we need this  -> for ssh to server side
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: ssh to production server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "start deploying"
                  mkdir -p devops

            - name: copy the docker compose file
              uses: appleboy/scp-action@v1
              with:  
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops
            - name: ssh to production server & run the app
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USERNAME }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                  echo "runthe app"
                  sudo apt-get install docker.io docker compose-v2 -y
                  sudo usermod -aG docker $USER && newgrp docker
                  echo ${{secrets.DOCKERHUB_TOKEN}} | docker login -u ${{vars.DOCKERHUB_USER}} --password-stdin
                  export DOCKERHUB_USER=${{vars.DOCKERHUB_USER}}
                  export DOCKERHUB_TAG=${{github.event.workflow_run.head_sha}}
                  cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always

